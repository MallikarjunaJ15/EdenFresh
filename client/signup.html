<!DOCTYPE html>
<html>
<head>
  <title>Signup - EdenFresh</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(#10b981, #065f46);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #10b981;
      color: white;
      border: none;
      cursor: pointer;
    }

    a {
      color: #065f46;
      text-decoration: none;
    }

    #msg {
      color: red;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>EdenFresh 🌿</h2>
    <p>Create your account</p>

    <form id="signupForm">
      <input type="text" id="name" placeholder="Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Signup</button>
    </form>

    <p id="msg"></p>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script>
    const API = "http://127.0.0.1:3000/api/v1/auth";

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const res = await fetch(`${API}/signup`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({
          name: name.value,
          email: email.value,
          password: password.value
        })
      });

      const data = await res.json();

      if (res.ok) {
        window.location.href = "login.html";
      } else {
        msg.innerText = data.msg;
      }
    });
  </script>
</body>
</html>
